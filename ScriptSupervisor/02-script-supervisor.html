<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Supervisor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c0a;
    --surface: #121410;
    --surface2: #1a1c18;
    --border: #242620;
    --accent: #b8d4a0;
    --accent2: #94b87c;
    --text: #e8ede0;
    --muted: #656960;
    --danger: #c97b5a;
    --warn: #c9a85a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }
  .header {
    padding: 32px 24px 24px;
    border-bottom: 1px solid var(--border);
    max-width: 720px;
    margin: 0 auto;
  }
  .header-eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
  .header-sub { font-size: 11px; color: var(--muted); }
  .container { max-width: 720px; margin: 0 auto; padding: 28px 24px 80px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px;
    margin-bottom: 16px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  select, input[type="text"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 18px;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent2); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; line-height: 1.7; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    padding: 11px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .spinner-label {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
    padding: 16px 0;
  }
  .spinner-label.visible { display: flex; }
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots span {
    width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
    animation: dot-pulse 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse { 0%,80%,100% { opacity:0.2;transform:scale(0.8); } 40% { opacity:1;transform:scale(1); } }

  .response-area {
    display: none;
    margin-top: 4px;
    animation: fadeIn 0.3s ease;
  }
  .response-area.visible { display: block; }
  @keyframes fadeIn { from { opacity:0;transform:translateY(6px); } to { opacity:1;transform:translateY(0); } }

  .response-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .response-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 0 8px 8px;
    padding: 22px;
    font-size: 13px;
    line-height: 1.9;
    white-space: pre-wrap;
  }

  .char-count {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: -14px;
    margin-bottom: 18px;
  }

  .type-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }
  .pill.active { background: rgba(184,212,160,0.1); border-color: var(--accent); color: var(--accent); }

  @media (max-width: 480px) {
    .type-pills { gap: 6px; }
    .pill { font-size: 10px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Director Suite · 02</div>
  <div class="header-title">Script Supervisor</div>
  <div class="header-sub">Brutal feedback. Sharper content.</div>
</div>

<div class="container">

  <div class="card">
    <div class="section-label">Video format</div>
    <div class="type-pills" id="typePills">
      <div class="pill active" data-val="shortform" onclick="selectType(this)">Short-form · Reels / TikTok</div>
      <div class="pill" data-val="longform" onclick="selectType(this)">Long-form · Talking head</div>
      <div class="pill" data-val="ugc" onclick="selectType(this)">UGC · Brand review</div>
      <div class="pill" data-val="storytelling" onclick="selectType(this)">Storytelling · Narrative</div>
    </div>

    <div class="section-label">Video concept <span style="color:var(--muted);font-size:10px;">(optional but recommended)</span></div>
    <textarea id="scriptConcept" placeholder="What is this video about? What's the goal?" style="min-height:70px;"></textarea>

    <div class="section-label">Your script</div>
    <textarea id="scriptContent" placeholder="Paste your full script here..." style="min-height:200px;" oninput="updateCharCount(this,'scriptCount')"></textarea>
    <div class="char-count" id="scriptCount">0 characters</div>

    <button class="btn" onclick="analyzeScript()" id="analyzeBtn">Analyze my script →</button>
  </div>

  <div class="spinner-label" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    Reading your script closely...
  </div>

  <div class="response-area" id="responseArea">
    <div class="response-header">
      <span>●</span> Script Analysis
    </div>
    <div class="response-body" id="responseBody"></div>
  </div>

</div>

<script>
  let selectedType = 'shortform';

  function selectType(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedType = el.dataset.val;
  }

  function updateCharCount(el, countId) {
    const len = el.value.length;
    const words = el.value.trim() ? el.value.trim().split(/\s+/).length : 0;
    document.getElementById(countId).textContent = `${words} words · ${len} characters`;
  }

  async function analyzeScript() {
    const concept = document.getElementById('scriptConcept').value.trim();
    const script = document.getElementById('scriptContent').value.trim();
    if (!script) { alert('Please paste your script first.'); return; }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    document.getElementById('loading').classList.add('visible');
    const body = document.getElementById('responseBody');
    body.textContent = '';
    document.getElementById('responseArea').classList.remove('visible');

    const systemPrompts = {
      shortform: `You are a brutally honest short-form video script consultant. You evaluate scripts with uncompromising standards for Reels and TikTok.

Your job is to give the creator exactly what they need to improve — not validation.

Analyze using these pillars:

🪝 HOOK (first 1–3 seconds)
Is it strong enough to stop the scroll? Would YOU stop for it? Rate it honestly. What's missing? A better option?

⚡ PROBLEM STATEMENT
Is there a relatable pain point established quickly? Does it create tension? Or does it go straight to solution with no setup?

💡 SOLUTION / BODY
Is the payoff satisfying? Is it too long? Is every sentence earning its place, or is there filler?

📣 CTA
Is it clear, specific, and natural? Or is it generic ("follow for more") and forgettable?

✂️ WHAT TO CUT
Be specific. Quote the lines or sections that should go.

➕ WHAT TO ADD
Specific missing elements: pattern interrupts, curiosity gaps, stakes, emotion, specificity.

🔧 REWRITE SUGGESTIONS
Give 1–2 specific improved versions of the weakest lines.

🎯 OVERALL VERDICT
One honest sentence. No softening.`,

      longform: `You are an experienced long-form video coach and narrative consultant. You specialize in talking-head content, YouTube, and direct-to-camera storytelling.

Analyze this script for:

🪝 OPENING HOOK
Does it establish a compelling promise in the first 30 seconds? Would a cold viewer stay?

📖 STORYTELLING ARC
Is there a clear narrative spine — setup, conflict, resolution? Or is it a list with no emotional thread?

🔁 ENGAGEMENT LOOPS
Identify every moment where a viewer could click away. What should be added at those points to re-engage?

🎭 DELIVERY GUIDANCE
Suggest specific tone shifts, energy calibration, and moments where the creator should lean in, pause, or be more vulnerable.

📍 STRUCTURE
Does the pacing work? Are sections too long? Too short? What's the optimal order?

✂️ WHAT TO CUT
Be specific. What is filler, off-topic, or slowing the video down?

📣 CTA
Is the ask clear and earned by the content that came before it?

🎯 OVERALL VERDICT
One honest sentence. Where is this script right now, and what would take it from good to great?`,

      ugc: `You are a UGC script strategist with deep experience in brand content that converts. You evaluate UGC scripts with the eyes of a brand manager and a viewer simultaneously.

Analyze for:

🪝 HOOK
Does it feel native and authentic — not ad-like? Does it earn attention in the first 2 seconds?

🤝 RELATABILITY & TRUST
Does the creator come across as a real person with a real opinion? Or does it feel scripted and transactional?

🛍️ PRODUCT INTEGRATION
Is the product introduced naturally or forced? Is the benefit shown or just stated?

⚡ PROBLEM → SOLUTION ARC
Is there a clear moment of "I had this problem, this solved it"? Or is it just feature-listing?

📣 CTA
Does it drive a specific action? Is it appropriate for UGC (swipe up, try it, link in bio, etc.)?

✂️ WHAT TO CUT
Lines that sound like an ad, not a recommendation.

🎯 OVERALL VERDICT
Would a brand approve this? Would a viewer believe it? One honest sentence on where it stands.`,

      storytelling: `You are a narrative script editor specializing in short and long-form storytelling for social media.

Analyze for:

🪝 OPENING
Does the first sentence or scene create immediate intrigue, emotion, or stakes?

🧵 NARRATIVE THREAD
Is there a clear through-line? A character (even if it's the creator), a conflict, and a resolution?

❤️ EMOTIONAL CORE
What is the emotional payoff? Is it earned by what comes before? What emotion should the viewer feel and is the script achieving that?

🎭 VOICE & AUTHENTICITY
Does this sound like a real person telling a real story? Or is it polished to the point of feeling fake?

⏱️ PACING
Where does the story drag? Where does it rush? What should breathe more, and what should be tightened?

✂️ WHAT TO CUT
Scenes, lines, or details that don't serve the story.

🎯 OVERALL VERDICT
Is this a story worth telling — and is this version telling it well? One honest sentence.`
    };

    const userContent = `Video concept: ${concept || 'Not provided'}\n\nScript:\n${script}`;

    try {
      const response = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          stream: true,
          system: systemPrompts[selectedType],
          messages: [{ role: "user", content: userContent }]
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const data = line.slice(6).trim();
            if (data === "[DONE]") continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === "content_block_delta" && parsed.delta?.text) {
                body.textContent += parsed.delta.text;
                document.getElementById('responseArea').classList.add('visible');
              }
            } catch(e) {}
          }
        }
      }
    } catch(e) {
      body.textContent = 'Something went wrong. Please try again.';
      document.getElementById('responseArea').classList.add('visible');
    }

    btn.disabled = false;
    document.getElementById('loading').classList.remove('visible');
  }
</script>
</body>
</html>
